<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>製程計算機 (含換算工具)</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        h2 { font-size: 1.25rem; margin: 0 0 10px 0; color: #0f172a; }
        .hint { font-size: 0.85rem; color: #ef4444; margin-bottom: 15px; font-weight: bold; }
        .section-title { font-size: 0.95rem; font-weight: 700; margin: 15px 0 10px; color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; }
        .res-display { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; margin-top: 10px; }
        .res-target { background: #f0f9ff; border: 1px solid #bae6fd; }
        .res-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .res-label { font-size: 0.85rem; color: #64748b; }
        .res-num { font-size: 1.2rem; font-weight: 800; color: #1e293b; }
        .highlight { color: #0284c7; }
        .hr { border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0; }
        .swap-row { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>⚙️ 製程計算 (主程式)</h2>
        <div class="hint">優先鎖定料速，極限才動</div>

        <div class="section-title">1. 本製程 (現況)</div>
        <div class="grid">
            <div class="input-group"><label>寬</label><input type="number" id="w1" oninput="calc()" placeholder="0"></div>
            <div class="input-group"><label>厚</label><input type="number" id="t1" oninput="calc()" placeholder="0"></div>
            <div class="input-group"><label>速</label><input type="number" id="s1" oninput="calc()" placeholder="0"></div>
        </div>

        <div class="res-display">
            <div class="res-row"><span class="res-label">目前 料量 M</span><span id="m1_val" class="res-num">---</span></div>
            <div class="res-row"><span class="res-label">目前 料速 S</span><span id="s1_val" class="res-num">---</span></div>
        </div>

        <div class="section-title">2. 下一製程 (目標)</div>
        <div class="grid">
            <div class="input-group"><label>寬</label><input type="number" id="w2" oninput="calc()" placeholder="0"></div>
            <div class="input-group"><label>厚</label><input type="number" id="t2" oninput="calc()" placeholder="0"></div>
            <div class="input-group"><label>速</label><input type="number" id="s2" oninput="calc()" placeholder="0"></div>
        </div>

        <div class="res-display res-target">
            <div class="res-row"><span class="res-label">建議 料量 (M)</span><span id="m2_val" class="res-num highlight">---</span></div>
            <div class="res-row"><span class="res-label">建議 料速 (S)</span><span id="s2_val" class="res-num highlight">---</span></div>
        </div>
    </div>

    <div class="card">
        <h2>🔄 快速換算工具</h2>
        <div class="grid" style="grid-template-columns: 1fr 1fr;">
            <div class="input-group"><label>基準 料量 (M)</label><input type="number" id="bm" oninput="swap()" placeholder="基準M"></div>
            <div class="input-group"><label>基準 料速 (S)</label><input type="number" id="bs" oninput="swap()" placeholder="基準S"></div>
        </div>
        <div class="hr"></div>
        <div class="input-group">
            <label>👉 如果我想改成新的料量...</label>
            <div class="swap-row">
                <input type="number" id="nm" placeholder="新料量" oninput="swap()">
                <span style="color:#94a3b8;">➔</span>
                <div style="flex:1; text-align:right;"><span class="res-label">料速: </span><span id="rs" class="res-num" style="color:#d9480f;">---</span></div>
            </div>
        </div>
        <div class="input-group" style="margin-top:15px;">
            <label>👉 如果我想改成新的料速...</label>
            <div class="swap-row">
                <input type="number" id="ns" placeholder="新料速" oninput="swap()">
                <span style="color:#94a3b8;">➔</span>
                <div style="flex:1; text-align:right;"><span class="res-label">料量: </span><span id="rm" class="res-num" style="color:#d9480f;">---</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    function calc() {
        const w1 = parseFloat(document.getElementById('w1').value) || 0;
        const t1 = parseFloat(document.getElementById('t1').value) || 0;
        const s1 = parseFloat(document.getElementById('s1').value) || 0;
        const w2 = parseFloat(document.getElementById('w2').value) || 0;
        const t2 = parseFloat(document.getElementById('t2').value) || 0;
        const s2 = parseFloat(document.getElementById('s2').value) || 0;

        // 1. 顯示目前現況
        const currentTotal = w1 * t1 * s1;
        document.getElementById('m1_val').innerText = currentTotal ? currentTotal.toFixed(2) : "---";
        document.getElementById('s1_val').innerText = s1 ? s1.toFixed(2) : "---";

        // 2. 計算目標建議 (邏輯：維持總流量不變)
        if (currentTotal && w2 && t2) {
            const m2 = currentTotal / (w2 * t2);
            document.getElementById('m2_val').innerText = m2.toFixed(2);
            document.getElementById('s2_val').innerText = m2.toFixed(2); // 依據原始工具邏輯輸出
        } else {
            document.getElementById('m2_val').innerText = "---";
            document.getElementById('s2_val').innerText = "---";
        }
    }

    function swap() {
        const bm = parseFloat(document.getElementById('bm').value) || 0;
        const bs = parseFloat(document.getElementById('bs').value) || 0;
        const nm = parseFloat(document.getElementById('nm').value) || 0;
        const ns = parseFloat(document.getElementById('new_s') ? 0 : document.getElementById('ns').value) || 0;
        const baseTotal = bm * bs;

        if (baseTotal && nm) document.getElementById('rs').innerText = (baseTotal / nm).toFixed(2);
        if (baseTotal && ns) document.getElementById('rm').innerText = (baseTotal / ns).toFixed(2);
    }
</script>
</body>
</html>
