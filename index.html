<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>製程計算機 (含換算工具)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f4f6f8; padding: 20px; display: flex; justify-content: center; padding-bottom: 50px; }
        .main-wrapper { width: 100%; max-width: 450px; }
        
        /* 卡片通用樣式 */
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        
        h2, h3 { text-align: center; color: #333; margin: 0 0 15px 0; }
        h2 { font-size: 20px; }
        h3 { font-size: 16px; color: #555; border-bottom: 1px dashed #ccc; padding-bottom: 10px; }

        /* 標題與分隔線 */
        .section-header { font-size: 14px; font-weight: bold; margin-top: 10px; margin-bottom: 5px; color: #444; }
        .blue-text { color: #1565c0; }
        .orange-text { color: #e65100; }
        .purple-text { color: #6a1b9a; }

        /* 輸入框 */
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-col { flex: 1; }
        label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; text-align: center; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; text-align: center; font-size: 18px; font-weight: 500; }
        input:focus { outline: none; border-color: #2196f3; background-color: #f0f8ff; }

        .bg-blue { background-color: #e3f2fd; color: #0d47a1; }
        .bg-orange { background-color: #fff3e0; color: #e65100; }
        .bg-purple { background-color: #f3e5f5; color: #4a148c; }
        
        /* 結果區塊 */
        .result-container { margin-top: 20px; background-color: #f1f8e9; border-radius: 12px; padding: 15px; border: 2px solid #aed581; position: relative; }
        .result-row { display: flex; justify-content: space-around; align-items: center; }
        .res-item { text-align: center; width: 45%; }
        .res-label { font-size: 12px; color: #558b2f; margin-bottom: 2px; }
        .res-val { font-size: 28px; font-weight: bold; color: #2e7d32; }
        .status-badge { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            background: #33691e; color: white; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: bold;
        }

        /* 換算工具區塊 */
        .converter-box { background-color: #f8f9fa; border: 1px solid #ddd; border-radius: 12px; padding: 15px; margin-top: 10px; }
        .arrow-icon { font-size: 20px; color: #999; margin: 0 5px; }

        /* 警告樣式 */
        .warn-bg { background-color: #ffebee !important; border-color: #ef5350 !important; }
        .warn-text { color: #c62828 !important; }
        .warn-badge { background: #c62828 !important; }
    </style>
</head>
<body>

<div class="main-wrapper">
    
    <div class="card">
        <h2>⚙️ 製程計算 (主程式)</h2>
        <div style="font-size:12px; text-align:center; color:#888; margin-bottom:10px;">優先鎖定料速，極限才動</div>

        <div class="section-header blue-text">1. 本製程 (現況)</div>
        <div class="input-row">
            <div class="input-col"><label>寬</label><input type="number" id="currW" class="bg-blue" oninput="solve()"></div>
            <div class="input-col"><label>厚</label><input type="number" id="currT" class="bg-blue" oninput="solve()"></div>
            <div class="input-col"><label>速</label><input type="number" id="currV" class="bg-blue" oninput="solve()"></div>
        </div>
        <div class="input-row">
            <div class="input-col"><label>目前 料量 M</label><input type="number" id="currM" placeholder="6~11" style="border:2px solid #bbdefb;" oninput="solve()"></div>
            <div class="input-col"><label>目前 料速 S</label><input type="number" id="currS" placeholder="24~28" style="border:2px solid #bbdefb;" oninput="solve()"></div>
        </div>

        <div class="section-header orange-text">2. 下一製程 (目標)</div>
        <div class="input-row">
            <div class="input-col"><label>寬</label><input type="number" id="nextW" class="bg-orange" oninput="solve()"></div>
            <div class="input-col"><label>厚</label><input type="number" id="nextT" class="bg-orange" oninput="solve()"></div>
            <div class="input-col"><label>速</label><input type="number" id="nextV" class="bg-orange" oninput="solve()"></div>
        </div>

        <div class="result-container" id="resBox">
            <div class="status-badge" id="statusBadge">等待輸入...</div>
            <div class="result-row">
                <div class="res-item">
                    <div class="res-label">建議 料量 (M)</div>
                    <div class="res-val" id="resM">---</div>
                </div>
                <div class="res-item">
                    <div class="res-label">建議 料速 (S)</div>
                    <div class="res-val" id="resS">---</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card" style="border-top: 4px solid #9c27b0;">
        <h3>🔄 快速換算工具 (手動微調)</h3>
        <div style="font-size:12px; color:#666; margin-bottom:10px; text-align:center;">
            輸入基準值，換算另一邊 (維持總流量)
        </div>

        <div class="input-row">
            <div class="input-col"><label>基準 料量</label><input type="number" id="convBaseM" class="bg-purple" placeholder="M" oninput="calcConvert()"></div>
            <div class="input-col"><label>基準 料速</label><input type="number" id="convBaseS" class="bg-purple" placeholder="S" oninput="calcConvert()"></div>
        </div>

        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">

        <div class="converter-box">
            <label style="text-align:left; font-weight:bold; color:#333;">👉 如果我想改成新的料量...</label>
            <div class="input-row" style="align-items:center;">
                <div class="input-col"><input type="number" id="targetM" placeholder="新料量" oninput="convertByM()"></div>
                <div class="arrow-icon">➔</div>
                <div class="input-col">
                    <div id="outS" style="font-size:24px; font-weight:bold; text-align:center; color:#555;">---</div>
                    <div style="font-size:10px; text-align:center; color:#999;">對應料速</div>
                </div>
            </div>
        </div>

        <div class="converter-box">
            <label style="text-align:left; font-weight:bold; color:#333;">👉 如果我想改成新的料速...</label>
            <div class="input-row" style="align-items:center;">
                <div class="input-col"><input type="number" id="targetS" placeholder="新料速" oninput="convertByS()"></div>
                <div class="arrow-icon">➔</div>
                <div class="input-col">
                    <div id="outM" style="font-size:24px; font-weight:bold; text-align:center; color:#555;">---</div>
                    <div style="font-size:10px; text-align:center; color:#999;">對應料量</div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    // === 參數設定 ===
    const MIN_M = 6.0, MAX_M = 11.0;
    const MIN_S = 24.0, MAX_S = 28.0;

    // --- 主程式邏輯 (維持不變) ---
    function solve() {
        let cW = parseFloat(document.getElementById('currW').value);
        let cT = parseFloat(document.getElementById('currT').value);
        let cV = parseFloat(document.getElementById('currV').value);
        let cM = parseFloat(document.getElementById('currM').value);
        let cS = parseFloat(document.getElementById('currS').value);
        let nW = parseFloat(document.getElementById('nextW').value);
        let nT = parseFloat(document.getElementById('nextT').value);
        let nV = parseFloat(document.getElementById('nextV').value);

        if (cW && cT && cV && cM && cS && nW && nT && nV) {
            let currentVol = cW * cT * cV;
            let nextVol = nW * nT * nV;
            if (currentVol === 0) return;
            
            let targetFlow = (cM * cS) * (nextVol / currentVol);

            // 優先鎖定 S
            let finalM = 0;
            let finalS = cS; 
            let status = "";
            let isError = false;

            let tryM = targetFlow / finalS;

            if (tryM >= MIN_M && tryM <= MAX_M) {
                finalM = tryM;
                status = "✅ 僅調整料量";
            } else {
                if (tryM < MIN_M) {
                    finalM = MIN_M;
                    status = "⚠️ 料量達下限";
                } else {
                    finalM = MAX_M;
                    status = "⚠️ 料量達上限";
                }
                finalS = targetFlow / finalM;
            }

            if (finalS < MIN_S || finalS > MAX_S) {
                isError = true;
                status = "❌ 無法達成 (S超標)";
            }

            document.getElementById('resM').innerText = finalM.toFixed(2);
            document.getElementById('resS').innerText = finalS.toFixed(2);
            
            // 自動填入下方換算工具的基準值 (方便使用)
            document.getElementById('convBaseM').value = finalM.toFixed(2);
            document.getElementById('convBaseS').value = finalS.toFixed(2);
            // 清空換算結果
            document.getElementById('targetM').value = "";
            document.getElementById('targetS').value = "";
            document.getElementById('outS').innerText = "---";
            document.getElementById('outM').innerText = "---";

            updateStyle(status, isError, finalS !== cS);
        } else {
            document.getElementById('resM').innerText = "---";
            document.getElementById('resS').innerText = "---";
            document.getElementById('statusBadge').innerText = "等待輸入...";
        }
    }

    function updateStyle(status, isError, isChangedS) {
        let resBox = document.getElementById('resBox');
        let badge = document.getElementById('statusBadge');
        badge.innerText = status;

        if (isError) {
            resBox.className = "resul
