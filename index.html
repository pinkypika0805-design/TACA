<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>製程計算機 (含換算工具)</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; line-height: 1.5; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        h2 { font-size: 1.25rem; margin: 0 0 15px 0; color: #0f172a; display: flex; align-items: center; gap: 8px; }
        .hint { font-size: 0.85rem; color: #64748b; margin-bottom: 15px; background: #f1f5f9; padding: 8px 12px; border-radius: 8px; }
        .section-title { font-size: 0.95rem; font-weight: 700; margin: 15px 0 10px; color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; transition: border 0.2s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .res-display { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 12px; padding: 15px; margin-top: 15px; }
        .res-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .res-row:last-child { margin-bottom: 0; }
        .res-label { font-size: 0.85rem; color: #0369a1; }
        .res-num { font-size: 1.25rem; font-weight: 800; color: #0284c7; }
        .hr { border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0; }
        .swap-row { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
        .arrow { color: #94a3b8; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>⚙️ 製程計算 (主程式)</h2>
        <div class="hint">優先鎖定料速，極限才動</div>

        <div class="section-title">1. 本製程 (現況)</div>
        <div class="grid">
            <div class="input-group"><label>寬</label><input type="number" id="w1" oninput="calcMain()" placeholder="0"></div>
            <div class="input-group"><label>厚</label><input type="number" id="t1" oninput="calcMain()" placeholder="0"></div>
            <div class="input-group"><label>速</label><input type="number" id="s1" oninput="calcMain()" placeholder="0"></div>
        </div>

        <div class="section-title">2. 下一製程 (目標)</div>
        <div class="grid">
            <div class="input-group"><label>目標寬</label><input type="number" id="w2" oninput="calcMain()" placeholder="0"></div>
            <div class="input-group"><label>目標厚</label><input type="number" id="t2" oninput="calcMain()" placeholder="0"></div>
            <div class="input-group"><label>目標速</label><input type="number" id="s2" oninput="calcMain()" placeholder="0"></div>
        </div>

        <div id="main-result" class="res-display">
            <div class="res-row"><span class="res-label">建議 料量 (M)</span><span id="m_suggest" class="res-num">---</span></div>
            <div class="res-row"><span class="res-label">建議 料速 (S)</span><span id="s_suggest" class="res-val res-num">---</span></div>
        </div>
    </div>

    <div class="card">
        <h2>🔄 快速換算工具 (手動微調)</h2>
        <div class="hint">維持總流量 (料量 × 料速) 恆定</div>
        
        <div class="grid" style="grid-template-columns: 1fr 1fr;">
            <div class="input-group"><label>基準 料量 (M)</label><input type="number" id="base_m" oninput="calcSwap()" placeholder="基準M"></div>
            <div class="input-group"><label>基準 料速 (S)</label><input type="number" id="base_s" oninput="calcSwap()" placeholder="基準S"></div>
        </div>

        <div class="hr"></div>

        <div class="input-group">
            <label>👉 如果我想改成新的料量...</label>
            <div class="swap-row">
                <input type="number" id="new_m" placeholder="新料量" oninput="calcSwap()">
                <span class="arrow">➔</span>
                <div style="flex:1; text-align:right;"><span class="res-label">料速: </span><span id="res_s" class="res-num" style="color:#d9480f;">---</span></div>
            </div>
        </div>

        <div class="input-group" style="margin-top:20px;">
            <label>👉 如果我想改成新的料速...</label>
            <div class="swap-row">
                <input type="number" id="new_s" placeholder="新料速" oninput="calcSwap()">
                <span class="arrow">➔</span>
                <div style="flex:1; text-align:right;"><span class="res-label">料量: </span><span id="res_m" class="res-num" style="color:#d9480f;">---</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    function calcMain() {
        const w1 = parseFloat(document.getElementById('w1').value) || 0;
        const t1 = parseFloat(document.getElementById('t1').value) || 0;
        const s1 = parseFloat(document.getElementById('s1').value) || 0;
        const w2 = parseFloat(document.getElementById('w2').value) || 0;
        const t2 = parseFloat(document.getElementById('t2').value) || 0;
        const s2 = parseFloat(document.getElementById('s2').value) || 0;

        // 計算目前總量 M = W * T * S
        const currentM = w1 * t1 * s1;
        
        // 建議料量 = 目前總量 / (目標寬 * 目標厚) --> 這通常是為了求出在目標寬厚下的對應係數
        // 邏輯：下一製程料量 M = (w1*t1*s1) / (w2*t2)
        if (currentM && w2 && t2) {
            const mSuggest = currentM / (w2 * t2);
            document.getElementById('m_suggest').innerText = mSuggest.toFixed(2);
            
            // 如果有輸入目標速，則建議料速 = mSuggest (此處邏輯依據原始網頁)
            // 或是維持原本比例計算
            document.getElementById('s_suggest').innerText = mSuggest.toFixed(2);
        } else {
            document.getElementById('m_suggest').innerText = "---";
            document.getElementById('s_suggest').innerText = "---";
        }
    }

    function calcSwap() {
        const bm = parseFloat(document.getElementById('base_m').value) || 0;
        const bs = parseFloat(document.getElementById('base_s').value) || 0;
        const nm = parseFloat(document.getElementById('new_m').value) || 0;
        const ns = parseFloat(document.getElementById('new_s').value) || 0;
        
        const totalFlow = bm * bs;

        if (totalFlow && nm) {
            document.getElementById('res_s').innerText = (totalFlow / nm).toFixed(2);
        } else {
            document.getElementById('res_s').innerText = "---";
        }

        if (totalFlow && ns) {
            document.getElementById('res_m').innerText = (totalFlow / ns).toFixed(2);
        } else {
            document.getElementById('res_m').innerText = "---";
        }
    }
</script>

</body>
</html>
